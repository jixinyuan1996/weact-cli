version: 2

release:
  github:
    owner: jixinyuan1996
    name: weact-cli

before:
  hooks:
    - python3 scripts/fetch_meta.py

builds:
  - binary: weact-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/larksuite/cli/internal/build.Version={{ .Version }} -X github.com/larksuite/cli/internal/build.Date={{ .Date }} -X github.com/larksuite/cli/internal/build.AppName=weact-cli
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
      - riscv64

archives:
  - name_template: "weact-cli-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
